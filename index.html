<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({
        reconnection: true,
        reconnectionAttempts: 10,
        reconnectionDelay: 1000
    });

    let currentUser = "";
    let currentRoom = "";

    function login() {
        const nameInput = document.getElementById('userNameInput');
        const roomInput = document.getElementById('roomNameInput');
        
        if (nameInput && roomInput && nameInput.value.trim() && roomInput.value.trim()) {
            currentUser = nameInput.value;
            currentRoom = roomInput.value;
            socket.emit('join room', { user: currentUser, room: currentRoom });
            
            if(document.getElementById('auth-screen')) document.getElementById('auth-screen').style.display = 'none';
            if(document.getElementById('chat-screen')) document.getElementById('chat-screen').style.display = 'flex';
        }
    }

    socket.on('connect', () => {
        console.log('Связь с Алмазом установлена');
        if (currentUser && currentRoom) {
            socket.emit('join room', { user: currentUser, room: currentRoom });
        }
    });

    function sendMessage() {
        const input = document.getElementById('msgInput') || document.getElementById('messageInput');
        if (input && input.value.trim() && socket.connected) {
            socket.emit('chat message', { 
                user: currentUser, 
                room: currentRoom, 
                text: input.value 
            });
            input.value = '';
        }
    }

    socket.on('chat message', (msg) => {
        const messagesDiv = document.getElementById('messages');
        if(messagesDiv) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span class="u-name">${msg.user}</span>${msg.text}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    });

    socket.on('chat history', (history) => {
        const messagesDiv = document.getElementById('messages');
        if(messagesDiv) {
            messagesDiv.innerHTML = '';
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg';
                div.innerHTML = `<span class="u-name">${msg.user}</span>${msg.text}`;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    });

    // Безопасное ожидание загрузки DOM
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('msgInput') || document.getElementById('messageInput');
        if (input) {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        }
    });
</script>
