<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Алмаз Мессенджер</title>
    <style>
        /* Основные настройки фона и шрифтов */
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #8fb1d6; /* Цвет Telegram */
            background-image: url('https://www.transparenttextures.com/patterns/graphy.png');
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ЭКРАН ВХОДА */
        #auth-screen { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: white;
            z-index: 10;
        }
        #auth-screen h2 { color: #517da2; margin-bottom: 20px; }
        #auth-screen input {
            padding: 12px;
            margin: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 260px;
            font-size: 16px;
        }
        #auth-screen button {
            background: #517da2;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* ЭКРАН ЧАТА */
        #chat-screen { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Шапка чата */
        header {
            background: #517da2;
            color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        #roomTitle { margin: 0; font-size: 18px; font-weight: 500; }

        /* Область сообщений */
        #messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex;
            flex-direction: column;
        }

        /* СТИЛЬ ПУЗЫРЕЙ (ОБЛАЧЕК) */
        .msg { 
            max-width: 80%;
            margin-bottom: 10px; 
            padding: 8px 12px; 
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        /* Чужие сообщения (слева, белые) */
        .others {
            background: white;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        /* Твои сообщения (справа, зеленые) */
        .my {
            background: #efffde;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .u-name { 
            display: block;
            font-weight: bold; 
            color: #389ed6; 
            font-size: 12px;
            margin-bottom: 3px;
        }

        /* Панель ввода внизу */
        .input-area {
            background: white;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #msgInput { 
            flex: 1; 
            border: 1px solid #ddd; 
            border-radius: 20px;
            padding: 10px 15px; 
            outline: none;
            font-size: 16px;
        }
        .send-btn { 
            background: none; 
            border: none; 
            color: #248bcf; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h2>Алмаз Мессенджер</h2>
        <input type="text" id="userNameInput" placeholder="Ваше имя">
        <input type="text" id="roomNameInput" placeholder="Название группы">
        <button onclick="login()">Войти</button>
    </div>

    <div id="chat-screen">
        <header>
            <div id="roomTitle">Загрузка...</div>
        </header>
        
        <div id="messages"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение">
            <button class="send-btn" onclick="sendMessage()">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io({
            reconnection: true,
            reconnectionAttempts: 10,
            reconnectionDelay: 1000
        });

        let currentUser = "";
        let currentRoom = "";

        // Функция входа
        function login() {
            const name = document.getElementById('userNameInput').value.trim();
            const room = document.getElementById('roomNameInput').value.trim();
            
            if (name && room) {
                currentUser = name;
                currentRoom = room;
                
                socket.emit('join room', { user: currentUser, room: currentRoom });
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('roomTitle').innerText = room;
            }
        }

        // Помощник для отрисовки сообщения
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            if (!messagesDiv) return;

            const div = document.createElement('div');
            // Если имя совпадает с текущим — ставим класс 'my', если нет — 'others'
            const isMy = msg.user === currentUser;
            div.className = `msg ${isMy ? 'my' : 'others'}`;

            // Имя пользователя (показываем только для чужих сообщений)
            const nameHtml = !isMy ? `<span class="u-name">${msg.user}</span>` : "";
            
            div.innerHTML = `${nameHtml}${msg.text}`;
            messagesDiv.appendChild(div);
            
            // Авто-прокрутка вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Отправка
        function sendMessage() {
            const input = document.getElementById('msgInput');
            if (input.value.trim() && socket.connected) {
                const msgData = { 
                    user: currentUser, 
                    room: currentRoom, 
                    text: input.value 
                };
                socket.emit('chat message', msgData);
                input.value = '';
            }
        }

        // Слушаем входящие сообщения
        socket.on('chat message', (msg) => {
            displayMessage(msg);
        });

        // Загрузка истории
        socket.on('chat history', (history) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            history.forEach(msg => displayMessage(msg));
        });

        // Слушаем Enter
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('msgInput');
            if (input) {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
            }
        });

        socket.on('connect', () => {
            if (currentUser && currentRoom) {
                socket.emit('join room', { user: currentUser, room: currentRoom });
            }
        });
    </script>
</body>
</html>
